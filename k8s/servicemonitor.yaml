apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: llm-router
  namespace: default
  labels:
    app: llm-router
spec:
  selector:
    matchLabels:
      app: llm-router
  endpoints:
  - port: metrics
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
  - port: health
    path: /health
    interval: 60s
    scrapeTimeout: 5s
  namespaceSelector:
    matchNames:
    - default