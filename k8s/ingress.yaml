apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: llm-router-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - llm-router.example.com
    secretName: llm-router-tls
  rules:
  - host: llm-router.example.com
    http:
      paths:
      - path: /health
        pathType: Prefix
        backend:
          service:
            name: llm-router-service
            port:
              number: 8000
      - path: /metrics
        pathType: Prefix
        backend:
          service:
            name: llm-router-service
            port:
              number: 8000
      - path: /v1/chat/completions
        pathType: Prefix
        backend:
          service:
            name: llm-router-service
            port:
              number: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: llm-router-service
  labels:
    app: llm-router
spec:
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: llm-router
  type: ClusterIP